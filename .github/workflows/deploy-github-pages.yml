# Deploy Kapxr PIM to GitHub Pages (same repo, GitHub Actions).
# After first push: Repo → Settings → Pages → Build: GitHub Actions → save.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:gh-pages
        env:
          # Must match your repository name (https://<user>.github.io/<repo>/)
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Support both GitHub Variables (vars.*) and Secrets (secrets.*)
          VITE_PIM_DATA_SOURCE: ${{ vars.VITE_PIM_DATA_SOURCE || secrets.VITE_PIM_DATA_SOURCE }}
          VITE_BILLING_DATA_SOURCE: ${{ vars.VITE_BILLING_DATA_SOURCE || secrets.VITE_BILLING_DATA_SOURCE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
          VITE_INSFORGE_FUNCTION_MODE: ${{ vars.VITE_INSFORGE_FUNCTION_MODE || secrets.VITE_INSFORGE_FUNCTION_MODE }}
          VITE_INSFORGE_BASE_URL: ${{ vars.VITE_INSFORGE_BASE_URL || secrets.VITE_INSFORGE_BASE_URL }}
          VITE_INSFORGE_FUNCTION_SLUG: ${{ vars.VITE_INSFORGE_FUNCTION_SLUG || secrets.VITE_INSFORGE_FUNCTION_SLUG }}
          VITE_INSFORGE_ANON_KEY: ${{ vars.VITE_INSFORGE_ANON_KEY || secrets.VITE_INSFORGE_ANON_KEY }}
          VITE_WORKSPACE_SLUG: ${{ vars.VITE_WORKSPACE_SLUG || secrets.VITE_WORKSPACE_SLUG }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Required for OIDC / Pages publish (inherits from workflow, but explicit avoids surprises)
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
